listening-port=3478

fingerprint
lt-cred-mech

realm=thechat.local

user=thechat:thechat

total-quota=100
stale-nonce=600

# Docker bridge networking with static container IP 172.20.0.10
# external-ip=<advertised>/<actual> maps internal relay IP to host-reachable 127.0.0.1
listening-ip=0.0.0.0
relay-ip=172.20.0.10
external-ip=127.0.0.1/172.20.0.10

allow-loopback-peers

no-cli

min-port=49152
max-port=49252

log-file=stdout
verbose
