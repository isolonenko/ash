name: Client CI

on:
  push:
    branches: ["master"]
    paths:
      - "client/**"
  pull_request:
    branches: ["master"]
    paths:
      - "client/**"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc -b

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm vite build

      - name: Test
        run: pnpm test
