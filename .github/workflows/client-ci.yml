name: Client CI

on:
  push:
    branches: ["master"]
    paths:
      - "client/**"
  pull_request:
    branches: ["master"]
    paths:
      - "client/**"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx vite build

      - name: Test
        run: npm test
