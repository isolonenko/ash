[build]
  base = "."
  command = "cd client && rm -rf node_modules && npm install && npm run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "22"
  # Set VITE_SIGNALING_URL in Netlify UI (not here — it contains the deployment URL)

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
